<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💖 Yêu Em 💖 - 3D旋转情话</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Arial', 'Helvetica', sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* ===== 开场玫瑰花 + 心形 ===== */
        #rose-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #330000 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: none;
            animation: fadeOut 1s ease forwards 4s;
        }

        .rose-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .heart-bg {
            position: absolute;
            font-size: min(80vw, 15rem); /* 动态缩放，最大15rem */
            color: #ff3366;
            opacity: 0;
            filter: drop-shadow(0 0 50px #ff3366);
            animation: heartBloom 3.5s ease-in-out forwards;
            z-index: 1;
            transform-origin: center center;
            pointer-events: none;
            text-shadow: 0 0 100px #ff3366;
        }

        .rose {
            font-size: min(20vw, 4rem);
            animation: roseBloom 3.5s ease-in-out forwards;
            filter: drop-shadow(0 0 20px #ff3366);
            position: relative;
            z-index: 2;
            transform-origin: center center;
        }

        .rose-particle {
            position: absolute;
            color: #ff99cc;
            font-size: min(8vw, 2rem);
            opacity: 0;
            animation: roseParticles 3s ease-out forwards;
            pointer-events: none;
            z-index: 3;
        }

        .rose-text {
            margin-top: 5vh;
            font-size: min(6vw, 1.5rem);
            color: #ff99cc;
            text-shadow: 0 0 20px #ff3366;
            letter-spacing: 4px;
            opacity: 0;
            animation: fadeInText 1s ease forwards 1.2s;
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 0 10px;
        }

        @keyframes heartBloom {
            0% { transform: scale(0) rotate(0deg); opacity: 0; filter: drop-shadow(0 0 0 #ff3366); }
            15% { transform: scale(1.5) rotate(5deg); opacity: 0.3; filter: drop-shadow(0 0 50px #ff3366); }
            30% { transform: scale(4) rotate(0deg); opacity: 0.8; filter: drop-shadow(0 0 100px #ff3366); }
            45% { transform: scale(6) rotate(-5deg); opacity: 1; filter: drop-shadow(0 0 150px #ff3366); }
            60% { transform: scale(5) rotate(3deg); opacity: 0.8; filter: drop-shadow(0 0 120px #ff3366); }
            80% { transform: scale(2) rotate(0deg); opacity: 0.4; filter: drop-shadow(0 0 60px #ff3366); }
            100% { transform: scale(0.5) rotate(0deg); opacity: 0; filter: drop-shadow(0 0 20px #ff3366); }
        }

        @keyframes roseBloom {
            0% { transform: scale(0.2) rotate(-30deg); opacity: 0; filter: drop-shadow(0 0 10px #ff99cc); }
            20% { transform: scale(2) rotate(15deg); opacity: 0.5; filter: drop-shadow(0 0 50px #ff3366); }
            35% { transform: scale(6) rotate(0deg); opacity: 1; filter: drop-shadow(0 0 100px #ff3366); }
            50% { transform: scale(8) rotate(-5deg); opacity: 1; filter: drop-shadow(0 0 150px #ff3366); }
            65% { transform: scale(4) rotate(5deg); opacity: 0.8; filter: drop-shadow(0 0 120px #ff3366); }
            85% { transform: scale(1.5) rotate(0deg); opacity: 0.5; filter: drop-shadow(0 0 60px #ff3366); }
            100% { transform: scale(0.5) rotate(0deg); opacity: 0; filter: drop-shadow(0 0 20px #ff3366); }
        }

        @keyframes roseParticles {
            0% { transform: translate(0, 0) scale(0.5); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(var(--x, 200px), var(--y, -200px)) scale(0); opacity: 0; }
        }

        @keyframes fadeInText {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        /* ===== 3D 场景容器 ===== */
        .scene {
            width: 100%;
            height: 100%;
            perspective: 1200px;
            overflow: hidden;
            position: relative;
        }

        #rotate-container {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            will-change: transform;
        }

        /* 粒子容器 */
        #particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            transform-style: preserve-3d;
        }

        .particle {
            position: absolute;
            white-space: nowrap;
            opacity: 0;
            filter: drop-shadow(0 0 3px currentColor);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.6);
            backface-visibility: hidden;
            font-size: clamp(0.8rem, 4vw, 1.5rem); /* 粒子字体自适应 */
        }

        .particle.symbol {
            animation: floatRotate 8s linear forwards;
        }

        .particle.text-particle {
            font-size: clamp(0.7rem, 3.5vw, 1rem);
            animation: floatUp 8s linear forwards;
            color: #ffb6c1;
            text-shadow: 0 0 8px #ff69b4, 0 0 12px #ff1493;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.8); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }

        @keyframes floatRotate {
            0% { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-20vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        /* 主内容 */
        #main-content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            backface-visibility: hidden;
            pointer-events: none;
            padding: 0 15px; /* 防止内容贴边 */
        }

        #main-content > * {
            pointer-events: auto;
        }

        /* 素鸳装饰 */
        .yuan-yang {
            font-size: clamp(1.5rem, 6vw, 2rem);
            letter-spacing: 0.5rem;
            color: #ffdab9;
            text-shadow: 0 0 15px #ff69b4, 0 0 30px #ff1493;
            margin-bottom: 2vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.8rem;
            transform: translateZ(20px);
            flex-wrap: wrap;
        }

        .yuan-yang span {
            animation: gentleFloat 3s ease-in-out infinite;
        }

        .yuan-yang span:nth-child(2) { animation-delay: 0.2s; }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* 情话卡片 */
        .message-card {
            text-align: center;
            padding: 1rem 0.5rem;
            max-width: 100%;
            margin: 1vh 0;
            position: relative;
            transform: translateZ(30px);
        }

        .heart-top, .heart-bottom {
            font-size: clamp(2.5rem, 12vw, 4rem);
            line-height: 1;
            display: inline-block;
            color: #ff3b6f;
            text-shadow: 0 0 30px #ff3b6f, 0 0 60px #ff3b6f;
            animation: heartFloat 2.5s ease-in-out infinite;
        }

        .heart-top { animation-delay: 0s; }
        .heart-bottom { animation-delay: 0.3s; }

        @keyframes heartFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.1); }
        }

        /* 中央情话文字 */
        .love-line {
            font-size: clamp(1.3rem, 6vw, 2rem);
            font-weight: bold;
            color: white;
            text-shadow: 
                0 0 20px #ff3b6f,
                0 0 40px #ff3b6f,
                0 0 80px #ff3b6f,
                2px 2px 0 #ff1493,
                -2px -2px 0 #ff69b4;
            margin: 0.5rem 0;
            line-height: 1.4;
            word-break: break-word;
            min-height: 3rem;
            position: relative;
            display: inline-block;
            padding: 0 10px;
            max-width: 100%;
        }

        .love-line.textPop {
            animation: textPop 0.4s ease-out;
        }

        @keyframes textPop {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 环绕小星星 - 响应式调整位置 */
        .love-line::before, .love-line::after,
        .love-line .star-1, .love-line .star-2, .love-line .star-3,
        .love-line .star-4, .love-line .star-5, .love-line .star-6 {
            content: '✨';
            position: absolute;
            color: gold;
            font-size: clamp(0.8rem, 4vw, 1.2rem);
            text-shadow: 0 0 10px #ffaa00;
            opacity: 0.7;
            animation: twinkle 3s infinite alternate;
        }

        /* 动态定位，避免在小屏幕上跑出边界 */
        .love-line::before { top: -1.5rem; left: -1rem; }
        .love-line::after { bottom: -1.5rem; right: -1rem; }
        .love-line .star-1 { top: -2rem; right: 0.5rem; }
        .love-line .star-2 { bottom: -2rem; left: 0.5rem; }
        .love-line .star-3 { top: 0.5rem; left: -2rem; }
        .love-line .star-4 { top: 0.8rem; right: -2rem; }
        .love-line .star-5 { bottom: -1rem; left: -1.5rem; }
        .love-line .star-6 { bottom: -0.8rem; right: -1.8rem; }

        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* 双语情话区域 */
        .bilingual-box {
            margin: 2vh 0 0;
            max-width: 90%;
            text-align: center;
            transform: translateZ(10px);
        }

        .vietnamese-text {
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            color: #ffb6c1;
            text-shadow: 0 0 15px #ff69b4, 0 0 30px #ff1493;
            margin-bottom: 0.5rem;
            line-height: 1.4;
            word-break: break-word;
            letter-spacing: 1px;
        }

        .chinese-text {
            font-size: clamp(1rem, 4.5vw, 1.5rem);
            color: #ffdab9;
            text-shadow: 0 0 10px #ff8c00, 0 0 20px #ff4500;
            line-height: 1.4;
            word-break: break-word;
            letter-spacing: 1px;
            border-top: 1px dashed rgba(255, 51, 102, 0.5);
            padding-top: 0.5rem;
            margin-top: 0.3rem;
        }

        .footer {
            position: absolute;
            bottom: 2vh;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 2;
            font-size: clamp(0.7rem, 4vw, 1rem);
            color: #aaa;
            letter-spacing: 0.2rem;
            border-top: 1px solid #ff3b6f;
            padding-top: 0.8rem;
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0.8;
            transform: translateZ(5px);
        }

        /* 针对极窄屏幕微调 */
        @media (max-width: 360px) {
            .love-line { font-size: 1.2rem; }
            .heart-top, .heart-bottom { font-size: 2.5rem; }
            .vietnamese-text { font-size: 1.1rem; }
            .chinese-text { font-size: 0.9rem; }
            .yuan-yang { font-size: 1.3rem; gap: 0.3rem; }
        }
    </style>
</head>
<body>
    <!-- 开场玫瑰花 + 心形动画 -->
    <div id="rose-overlay">
        <div class="rose-container" id="roseContainer">
            <div class="heart-bg">❤️</div>
            <div class="rose" id="rose">🌹</div>
            <div class="rose-text">Em là đóa hồng của anh</div>
        </div>
    </div>

    <!-- 3D场景容器 -->
    <div class="scene">
        <div id="rotate-container">
            <div id="particles"></div>
            <div id="main-content">
                <!-- 素鸳装饰 -->
                <div class="yuan-yang">
                    <span>💕</span>
                    <span>素</span>
                    <span>鸳</span>
                    <span>💕</span>
                </div>

                <!-- 情话卡片 -->
                <div class="message-card">
                    <div class="heart-top">❤️</div>
                    <div class="love-line" id="loveMessage"></div>
                    <div class="heart-bottom">❤️</div>
                </div>

                <!-- 双语情话展示区域（固定一句） -->
                <div class="bilingual-box">
                    <div class="vietnamese-text" id="vietnameseDisplay">Anh rất thích em</div>
                    <div class="chinese-text" id="chineseDisplay">我很喜欢妳</div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">✦ I LOVE YOU FOREVER ✦</div>

    <script>
        (function() {
            // ---------- 越南语情话列表 (100句) ----------
            const vietnameseLines = [
                "Anh yêu em.", "Em là tất cả của anh.", "Anh không sống được thiếu em.",
                "Em làm trái tim anh rung động.", "Anh thích em từ cái nhìn đầu tiên.",
                "Em là người đặc biệt nhất.", "Anh muốn ở bên em mãi mãi.",
                "Em đẹp hơn cả mặt trăng.", "Anh nhớ em rất nhiều.", "Em là niềm vui của anh.",
                "Chỉ cần có em là đủ.", "Anh yêu em vô điều kiện.", "Em là lý do anh mỉm cười.",
                "Anh sẽ luôn bảo vệ em.", "Em là ánh sáng trong đời anh.", "Chỉ có em là đủ cho anh.",
                "Anh yêu em hơn chính mình.", "Em chiếm toàn bộ suy nghĩ của anh.",
                "Cuộc đời anh đẹp hơn vì có em.", "Em là điều tuyệt vời nhất.",
                "Anh muốn ôm em thật chặt.", "Em là tình yêu của đời anh.", "Anh không bao giờ bỏ em.",
                "Em làm anh hạnh phúc thực sự.", "Anh chỉ yêu một mình em.", "Em là thiên đường của anh.",
                "Anh muốn nghe em cười mỗi ngày.", "Em là lý do anh sống.", "Anh yêu em ngày càng nhiều.",
                "Em là người anh muốn kết hôn.", "Chỉ nhìn em là anh hạnh phúc.",
                "Em là câu chuyện đẹp nhất của anh.", "Anh sẽ yêu em mãi mãi.", "Em làm anh tốt hơn.",
                "Anh không thể quên em.", "Em là nắng ấm trong tim anh.", "Anh muốn dành cả đời cho em.",
                "Em là người anh tin tưởng nhất.", "Anh yêu em hơn mọi lời nói.",
                "Em là điều anh mong chờ nhất.", "Em hạnh phúc là anh hạnh phúc.",
                "Em là trái tim thứ hai của anh.", "Anh luôn bên em khi cần.", "Em làm anh say đắm.",
                "Anh không cần gì ngoài em.", "Em là giấc mơ đẹp nhất.",
                "Anh yêu em từ trái tim sâu nhất.", "Em là hoàn hảo với anh.",
                "Anh muốn chia sẻ mọi điều với em.", "Em là lý do anh tin yêu.",
                "Anh không làm em buồn bao giờ.", "Em là món quà tuyệt vời nhất.",
                "Anh muốn hôn em ngọt ngào.", "Em là tất cả ý nghĩa của anh.",
                "Anh yêu em hơn cuộc sống.", "Em làm trái tim anh tan chảy.",
                "Anh muốn đi khắp thế giới với em.", "Em là người anh tìm kiếm suốt đời.",
                "Anh yêu em đến cuối đời.", "Em là niềm hy vọng của anh.",
                "Chỉ cần em ở bên là đủ.", "Em làm cuộc đời anh có ý nghĩa.",
                "Anh yêu em không cần lý do.", "Em là người làm anh thay đổi.",
                "Anh muốn nghe em nói yêu anh.", "Em là điều quý giá nhất.",
                "Anh sẽ trân trọng em mãi.", "Em có nụ cười đẹp nhất.",
                "Anh không sống được nếu thiếu em.", "Em là tình yêu đích thực.",
                "Anh muốn xây tương lai cùng em.", "Em là người anh muốn chăm sóc.",
                "Anh yêu em hơn mọi thứ.", "Em làm anh cảm thấy hoàn hảo.",
                "Anh sẽ yêu em không đổi.", "Em có ánh mắt đẹp nhất.",
                "Anh muốn nắm tay em mãi.", "Em là hạnh phúc thực sự.",
                "Anh không yêu ai khác ngoài em.", "Em là điều tuyệt vời nhất đời anh.",
                "Anh muốn sống cùng em mãi.", "Em làm anh yêu cuộc sống hơn.",
                "Anh yêu em bằng cả trái tim.", "Em là lý do anh mơ ước.",
                "Anh bảo vệ em khỏi mọi đau thương.", "Em là người anh yêu trọn đời.",
                "Anh không cần thế giới nếu không có em.", "Em có giọng nói dễ thương nhất.",
                "Anh muốn nhìn mặt trăng với em.", "Em là điều anh ước mong.",
                "Anh yêu em ngày càng sâu.", "Em làm anh hạnh phúc nhất.",
                "Anh sẽ luôn nhớ em.", "Em là tình yêu không thể thay thế.",
                "Anh muốn em là của anh.", "Em làm anh tin vào hạnh phúc.",
                "Anh yêu em hơn mọi lời hứa.", "Em đẹp nhất trong mắt anh.",
                "Anh muốn cùng em mọi khoảnh khắc.", "Em là tình yêu của đời anh, mãi mãi."
            ];

            // ---------- 粒子符号 ----------
            const symbols = [
                '❤️', '🧡', '💛', '💚', '💙', '💜', '🖤', '🤍', '🤎',
                '💕', '💞', '💓', '💗', '💖', '💘', '💝', '💟',
                '✨', '🌟', '⭐', '🌠', '💫', '⭐', '🌠',
                '🌸', '🌺', '🌹', '🌷', '🌼', '🌻', '🥀', '🌿',
                '🌙', '🌝', '🌞', '🌈', '☁️', '❄️', '🌊',
                '🦋', '🐞', '🐝', '🕊️', '🦢', '🐚', '🌌',
                '🎀', '🎈', '🎉', '💎', '👑', '💍', '💐',
                '♡', '♥️', '♦️', '♣️', '♠️', '♨️', '❣️',
                '✧', '✦', '❋', '✽', '❃', '✾', '❀', '✿', '❁',
                '🍇', '🍒', '🫐', '🫐', '🥭', '💞', '💕', '💓', '💖', '🫜',
                '🌸', '🌺', '🌹', '💐', '🪷', '🪸', '🌷', '🍄‍🟫', '🍄', '❄️'
            ];

            // 获取元素
            const particlesContainer = document.getElementById('particles');
            const loveMessageEl = document.getElementById('loveMessage');
            const vietnameseDisplay = document.getElementById('vietnameseDisplay');
            const chineseDisplay = document.getElementById('chineseDisplay');
            const rotateContainer = document.getElementById('rotate-container');

            // 生成玫瑰花粒子效果
            function createRoseParticles() {
                const roseContainer = document.getElementById('roseContainer');
                for (let i = 0; i < 20; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'rose-particle';
                    particle.textContent = ['✨', '💫', '🌸', '🌹'][Math.floor(Math.random() * 4)];
                    particle.style.left = '50%';
                    particle.style.top = '50%';
                    particle.style.setProperty('--x', (Math.random() * 300 - 150) + 'px');
                    particle.style.setProperty('--y', (Math.random() * 300 - 150) + 'px');
                    particle.style.animationDelay = (i * 0.1) + 's';
                    roseContainer.appendChild(particle);
                    setTimeout(() => particle.remove(), 3000);
                }
            }
            setTimeout(createRoseParticles, 500);

            // 为情话文字添加环绕小星星
            for (let i = 1; i <= 6; i++) {
                const star = document.createElement('span');
                star.className = `star-${i}`;
                star.textContent = '✨';
                loveMessageEl.appendChild(star);
            }

            // 创建粒子
            function createParticle() {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const isSentence = Math.random() > 0.5; 
                
                if (isSentence) {
                    const randomIndex = Math.floor(Math.random() * vietnameseLines.length);
                    const sentence = vietnameseLines[randomIndex];
                    particle.textContent = sentence;
                    particle.classList.add('text-particle');
                    const size = 0.7 + Math.random() * 0.6;
                    particle.style.fontSize = size + 'rem';
                    const colors = ['#ffb6c1', '#ffa07a', '#ffdab9', '#e6e6fa', '#f0e68c', '#ffc0cb'];
                    particle.style.color = colors[Math.floor(Math.random() * colors.length)];
                } else {
                    const symbol = symbols[Math.floor(Math.random() * symbols.length)];
                    particle.textContent = symbol;
                    particle.classList.add('symbol');
                    const size = 0.8 + Math.random() * 1.7;
                    particle.style.fontSize = size + 'rem';
                    const colors = ['#ff99cc', '#ff6699', '#ff3366', '#ff5050', '#ffaa00', '#ffd700', '#ff69b4', '#ff1493', '#ff8c00', '#ffa500'];
                    particle.style.color = colors[Math.floor(Math.random() * colors.length)];
                }
                
                particle.style.left = Math.random() * 100 + '%';
                const duration = 4 + Math.random() * 12;
                particle.style.animationDuration = duration + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                
                particlesContainer.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, duration * 1000 + 3000);
            }

            setInterval(createParticle, 150);

            // 主情话轮播
            let currentIndex = 0;
            function updateLoveMessage() {
                loveMessageEl.textContent = vietnameseLines[currentIndex];
                // 重新添加小星星
                for (let i = 1; i <= 6; i++) {
                    const star = document.createElement('span');
                    star.className = `star-${i}`;
                    star.textContent = '✨';
                    loveMessageEl.appendChild(star);
                }
                loveMessageEl.classList.add('textPop');
                setTimeout(() => {
                    loveMessageEl.classList.remove('textPop');
                }, 400);
                
                currentIndex = (currentIndex + 1) % vietnameseLines.length;
            }
            updateLoveMessage();
            setInterval(updateLoveMessage, 1300);

            // ---------- 3D触摸旋转 ----------
            let startX = 0, startY = 0;
            let currentRotateX = 0, currentRotateY = 0;
            let isDragging = false;

            rotateContainer.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    isDragging = true;
                    e.preventDefault();
                }
            }, { passive: false });

            rotateContainer.addEventListener('touchmove', (e) => {
                if (!isDragging || e.touches.length !== 1) return;
                e.preventDefault();
                
                const dx = e.touches[0].clientX - startX;
                const dy = e.touches[0].clientY - startY;
                
                let targetRotateY = currentRotateY + dx * 0.2;
                let targetRotateX = currentRotateX - dy * 0.2;
                
                targetRotateY = Math.min(30, Math.max(-30, targetRotateY));
                targetRotateX = Math.min(30, Math.max(-30, targetRotateX));
                
                rotateContainer.style.transform = `rotateX(${targetRotateX}deg) rotateY(${targetRotateY}deg)`;
                
                currentRotateX = targetRotateX;
                currentRotateY = targetRotateY;
                
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            }, { passive: false });

            rotateContainer.addEventListener('touchend', () => {
                isDragging = false;
            });

            // 鼠标支持（调试用）
            rotateContainer.addEventListener('mousedown', (e) => {
                startX = e.clientX;
                startY = e.clientY;
                isDragging = true;
                e.preventDefault();
            });
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                e.preventDefault();
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                
                let targetRotateY = currentRotateY + dx * 0.2;
                let targetRotateX = currentRotateX - dy * 0.2;
                
                targetRotateY = Math.min(30, Math.max(-30, targetRotateY));
                targetRotateX = Math.min(30, Math.max(-30, targetRotateX));
                
                rotateContainer.style.transform = `rotateX(${targetRotateX}deg) rotateY(${targetRotateY}deg)`;
                
                currentRotateX = targetRotateX;
                currentRotateY = targetRotateY;
                
                startX = e.clientX;
                startY = e.clientY;
            });
            window.addEventListener('mouseup', () => {
                isDragging = false;
            });
        })();
    </script>
</body>
</html>

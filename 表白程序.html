<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💖 Yêu Em 💖 - 3D旋转双语情话</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Arial', 'Helvetica', sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        /* ===== 开场玫瑰花 + 心形 (增强仪式感) ===== */
        #rose-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #330000 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: none;
            animation: fadeOut 1s ease forwards 4s; /* 延长淡出时间 */
        }
        .rose-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        /* 心形元素（新增加） */
        .heart-bg {
            position: absolute;
            font-size: 15rem; /* 基础大小，配合缩放实现巨大化 */
            color: #ff3366;
            opacity: 0;
            filter: drop-shadow(0 0 50px #ff3366);
            animation: heartBloom 3.5s ease-in-out forwards;
            z-index: 1;
            transform-origin: center center;
            pointer-events: none;
            text-shadow: 0 0 100px #ff3366;
        }
        .rose {
            font-size: 4rem;
            animation: roseBloom 3.5s ease-in-out forwards;
            filter: drop-shadow(0 0 20px #ff3366);
            position: relative;
            z-index: 2;
            transform-origin: center center;
        }
        .rose-particle {
            position: absolute;
            color: #ff99cc;
            font-size: 2rem;
            opacity: 0;
            animation: roseParticles 3s ease-out forwards;
            pointer-events: none;
            z-index: 3;
        }
        .rose-text {
            margin-top: 30px;
            font-size: 1.5rem;
            color: #ff99cc;
            text-shadow: 0 0 20px #ff3366;
            letter-spacing: 4px;
            opacity: 0;
            animation: fadeInText 1s ease forwards 1.2s;
            position: relative;
            z-index: 2;
        }
        @keyframes heartBloom {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 0;
                filter: drop-shadow(0 0 0 #ff3366);
            }
            15% {
                transform: scale(1.5) rotate(5deg);
                opacity: 0.3;
                filter: drop-shadow(0 0 50px #ff3366);
            }
            30% {
                transform: scale(4) rotate(0deg);
                opacity: 0.8;
                filter: drop-shadow(0 0 100px #ff3366);
            }
            45% {
                transform: scale(6) rotate(-5deg);
                opacity: 1;
                filter: drop-shadow(0 0 150px #ff3366);
            }
            60% {
                transform: scale(5) rotate(3deg);
                opacity: 0.8;
                filter: drop-shadow(0 0 120px #ff3366);
            }
            80% {
                transform: scale(2) rotate(0deg);
                opacity: 0.4;
                filter: drop-shadow(0 0 60px #ff3366);
            }
            100% {
                transform: scale(0.5) rotate(0deg);
                opacity: 0;
                filter: drop-shadow(0 0 20px #ff3366);
            }
        }
        @keyframes roseBloom {
            0% {
                transform: scale(0.2) rotate(-30deg);
                opacity: 0;
                filter: drop-shadow(0 0 10px #ff99cc);
            }
            20% {
                transform: scale(2) rotate(15deg);
                opacity: 0.5;
                filter: drop-shadow(0 0 50px #ff3366);
            }
            35% {
                transform: scale(6) rotate(0deg);
                opacity: 1;
                filter: drop-shadow(0 0 100px #ff3366);
            }
            50% {
                transform: scale(8) rotate(-5deg);
                opacity: 1;
                filter: drop-shadow(0 0 150px #ff3366);
            }
            65% {
                transform: scale(4) rotate(5deg);
                opacity: 0.8;
                filter: drop-shadow(0 0 120px #ff3366);
            }
            85% {
                transform: scale(1.5) rotate(0deg);
                opacity: 0.5;
                filter: drop-shadow(0 0 60px #ff3366);
            }
            100% {
                transform: scale(0.5) rotate(0deg);
                opacity: 0;
                filter: drop-shadow(0 0 20px #ff3366);
            }
        }
        @keyframes roseParticles {
            0% {
                transform: translate(0, 0) scale(0.5);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--x, 200px), var(--y, -200px)) scale(0);
                opacity: 0;
            }
        }
        @keyframes fadeInText {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        /* ===== 3D 场景容器 ===== */
        .scene {
            width: 100%;
            height: 100%;
            perspective: 1200px;
            overflow: hidden;
            position: relative;
        }
        /* 旋转容器（所有可旋转内容） */
        #rotate-container {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            will-change: transform;
        }

        /* 粒子容器 */
        #particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            transform-style: preserve-3d;
        }
        .particle {
            position: absolute;
            white-space: nowrap;
            opacity: 0;
            filter: drop-shadow(0 0 3px currentColor);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.6);
            backface-visibility: hidden;
        }
        .particle.symbol {
            animation: floatRotate 8s linear forwards;
        }
        .particle.text-particle {
            font-size: 0.9rem;
            animation: floatUp 8s linear forwards;
            color: #ffb6c1;
            text-shadow: 0 0 8px #ff69b4, 0 0 12px #ff1493;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.8); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }
        @keyframes floatRotate {
            0% { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-20vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        /* 主内容 */
        #main-content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            backface-visibility: hidden;
            pointer-events: none;
        }
        #main-content > * {
            pointer-events: auto;
        }

        /* 素鸳装饰 */
        .yuan-yang {
            font-size: 1.8rem;
            letter-spacing: 10px;
            color: #ffdab9;
            text-shadow: 0 0 15px #ff69b4, 0 0 30px #ff1493;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transform: translateZ(20px);
        }
        .yuan-yang span {
            animation: gentleFloat 3s ease-in-out infinite;
        }
        .yuan-yang span:nth-child(2) { animation-delay: 0.2s; }
        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* 情话卡片 (无红色框) */
        .message-card {
            text-align: center;
            padding: 1rem 1.5rem 0.5rem;
            max-width: 90%;
            margin: 0 20px 20px;
            position: relative;
            transform: translateZ(30px);
        }
        .heart-top, .heart-bottom {
            font-size: 3.2rem;
            line-height: 1;
            display: inline-block;
            color: #ff3b6f;
            text-shadow: 0 0 30px #ff3b6f, 0 0 60px #ff3b6f;
            animation: heartFloat 2.5s ease-in-out infinite;
        }
        .heart-top { animation-delay: 0s; }
        .heart-bottom { animation-delay: 0.3s; }
        @keyframes heartFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.1); }
        }

        /* 中央情话文字 */
        .love-line {
            font-size: 1.6rem;
            font-weight: bold;
            color: white;
            text-shadow: 
                0 0 20px #ff3b6f,
                0 0 40px #ff3b6f,
                0 0 80px #ff3b6f,
                2px 2px 0 #ff1493,
                -2px -2px 0 #ff69b4;
            margin: 5px 0 10px;
            line-height: 1.4;
            word-break: break-word;
            min-height: 3rem;
            position: relative;
            display: inline-block;
            padding: 0 10px;
        }
        .love-line.textPop {
            animation: textPop 0.4s ease-out;
        }
        @keyframes textPop {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 环绕小星星 */
        .love-line::before, .love-line::after,
        .love-line .star-1, .love-line .star-2, .love-line .star-3,
        .love-line .star-4, .love-line .star-5, .love-line .star-6 {
            content: '✨';
            position: absolute;
            color: gold;
            font-size: 1rem;
            text-shadow: 0 0 10px #ffaa00;
            opacity: 0.7;
            animation: twinkle 3s infinite alternate;
        }
        .love-line::before { top: -20px; left: -20px; animation-delay: 0s; }
        .love-line::after { bottom: -20px; right: -20px; animation-delay: 0.5s; }
        .love-line .star-1 { top: -30px; right: 10px; animation-delay: 0.2s; }
        .love-line .star-2 { bottom: -25px; left: 5px; animation-delay: 0.7s; }
        .love-line .star-3 { top: 10px; left: -35px; animation-delay: 0.3s; }
        .love-line .star-4 { top: 15px; right: -35px; animation-delay: 0.8s; }
        .love-line .star-5 { bottom: -15px; left: -25px; animation-delay: 0.1s; }
        .love-line .star-6 { bottom: -10px; right: -30px; animation-delay: 0.4s; }
        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* 按钮区域 */
        .button-section {
            text-align: center;
            margin: 15px 0;
            width: 100%;
            position: relative;
            z-index: 10;
            transform: translateZ(15px);
        }
        .section-title {
            color: #ff99cc;
            font-size: 1rem;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #ff3366;
        }
        .button-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            padding: 0 15px;
            max-width: 500px;
            margin: 0 auto;
        }
        .love-button {
            background: rgba(255, 51, 102, 0.2);
            border: 2px solid #ff3366;
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 15px #ff3366;
            backdrop-filter: blur(3px);
            animation: buttonFloat 3s ease-in-out infinite;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
        }
        .love-button:nth-child(2) { animation-delay: 0.2s; }
        .love-button:nth-child(3) { animation-delay: 0.4s; }
        .love-button:nth-child(4) { animation-delay: 0.6s; }
        .love-button:nth-child(5) { animation-delay: 0.8s; }
        .love-button:nth-child(6) { animation-delay: 1s; }
        @keyframes buttonFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .love-button:hover {
            background: #ff3366;
            transform: scale(1.1);
            box-shadow: 0 0 30px #ff3366;
        }
        .love-button:active {
            transform: scale(0.9) translateY(-2px);
            background: #ff1a4f;
            transition: transform 0.05s;
        }

        /* ===== 优化后的双语情话区域 (无卡片背景和边框) ===== */
        .bilingual-box {
            margin: 20px 20px 0;
            max-width: 500px;
            text-align: center;
            transform: translateZ(10px);
        }
        .vietnamese-text {
            font-size: 1.5rem;
            color: #ffb6c1;
            text-shadow: 0 0 15px #ff69b4, 0 0 30px #ff1493;
            margin-bottom: 8px;
            line-height: 1.4;
            word-break: break-word;
            letter-spacing: 1px;
        }
        .chinese-text {
            font-size: 1.3rem;
            color: #ffdab9;
            text-shadow: 0 0 10px #ff8c00, 0 0 20px #ff4500;
            line-height: 1.4;
            word-break: break-word;
            letter-spacing: 1px;
            border-top: 1px dashed rgba(255, 51, 102, 0.5);
            padding-top: 8px;
            margin-top: 5px;
        }
        /* 切换动画 */
        .vietnamese-text.fade-in, .chinese-text.fade-in {
            animation: fadeInScale 0.4s ease-out;
        }
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .footer {
            position: absolute;
            bottom: 15px;
            z-index: 2;
            font-size: 0.9rem;
            color: #aaa;
            letter-spacing: 3px;
            border-top: 1px solid #ff3b6f;
            padding-top: 8px;
            width: 80%;
            text-align: center;
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0.8;
            transform: translateZ(5px);
            left: 50%;
            transform: translateX(-50%) translateZ(5px);
        }

        @media (max-width: 480px) {
            .love-line { font-size: 1.2rem; }
            .heart-top, .heart-bottom { font-size: 2.8rem; }
            .vietnamese-text { font-size: 1.3rem; }
            .chinese-text { font-size: 1.1rem; }
            .love-button { width: 55px; height: 55px; font-size: 1.6rem; }
        }
    </style>
</head>

                { viet: "Anh đã mê em rồi", chinese: "我迷上你了" }, 
                { viet: "Em là người duy nhất của anh", chinese: "你就是我的唯一" }, 
                { viet: "Em là động lực cho anh trở thành người tốt hơn", chinese: "你让我想要成为更好的人" }, 
                { viet: "Chúng ta sẽ cùng nhau già đi em nhé", chinese: "我想要和你一起慢慢变老" }, 
                { viet: "Em mãi mãi là duy nhất trong trái tim anh", chinese: "妳永远是我心中的唯一" }, 
                { viet: "Con yêu mẹ nhiều lắm", chinese: "我爱你，妈妈" }, 
                { viet: "Em làm anh trẻ ra nhiều", chinese: "妳让我觉得我变年轻了" }, 
                { viet: "Chúng ta đến với nhau nhé", chinese: "我们在一起吧" } 
            ];

            // ---------- 粒子符号 ----------
            const symbols = [
                '❤️', '🧡', '💛', '💚', '💙', '💜', '🖤', '🤍', '🤎',
                '💕', '💞', '💓', '💗', '💖', '💘', '💝', '💟',
                '✨', '🌟', '⭐', '🌠', '💫', '⭐', '🌠',
                '🌸', '🌺', '🌹', '🌷', '🌼', '🌻', '🥀', '🌿',
                '🌙', '🌝', '🌞', '🌈', '☁️', '❄️', '🌊',
                '🦋', '🐞', '🐝', '🕊️', '🦢', '🐚', '🌌',
                '🎀', '🎈', '🎉', '💎', '👑', '💍', '💐',
                '♡', '♥️', '♦️', '♣️', '♠️', '♨️', '❣️',
                '✧', '✦', '❋', '✽', '❃', '✾', '❀', '✿', '❁',
                '🍇', '🍒', '🫐', '🫐', '🥭', '💞', '💕', '💓', '💖', '🫜',
                '🌸', '🌺', '🌹', '💐', '🪷', '🪸', '🌷', '🍄‍🟫', '🍄', '❄️'
            ];

            // 获取元素
            const particlesContainer = document.getElementById('particles');
            const loveMessageEl = document.getElementById('loveMessage');
            const vietnameseDisplay = document.getElementById('vietnameseDisplay');
            const chineseDisplay = document.getElementById('chineseDisplay');
            const buttonGrid = document.getElementById('buttonGrid');
            const rotateContainer = document.getElementById('rotate-container');

            // 生成玫瑰花粒子效果（增加粒子数量）
            function createRoseParticles() {
                const roseContainer = document.getElementById('roseContainer');
                for (let i = 0; i < 20; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'rose-particle';
                    particle.textContent = ['✨', '💫', '🌸', '🌹'][Math.floor(Math.random() * 4)];
                    particle.style.left = '50%';
                    particle.style.top = '50%';
                    particle.style.setProperty('--x', (Math.random() * 300 - 150) + 'px');
                    particle.style.setProperty('--y', (Math.random() * 300 - 150) + 'px');
                    particle.style.animationDelay = (i * 0.1) + 's';
                    roseContainer.appendChild(particle);
                    setTimeout(() => particle.remove(), 3000);
                }
            }
            setTimeout(createRoseParticles, 500);

            // 为情话文字添加环绕小星星
            for (let i = 1; i <= 6; i++) {
                const star = document.createElement('span');
                star.className = `star-${i}`;
                star.textContent = '✨';
                loveMessageEl.appendChild(star);
            }

            // 创建按钮
            for (let i = 0; i < 6; i++) {
                const button = document.createElement('div');
                button.className = 'love-button';
                button.textContent = '❤️';
                button.dataset.index = i;
                buttonGrid.appendChild(button);
            }

            // 按钮点击事件
            buttonGrid.addEventListener('click', function(e) {
                const button = e.target.closest('.love-button');
                if (!button) return;
                const index = parseInt(button.dataset.index) % bilingualLoveLines.length;
                const line = bilingualLoveLines[index];
                
                vietnameseDisplay.textContent = line.viet;
                chineseDisplay.textContent = line.chinese;
                
                vietnameseDisplay.classList.add('fade-in');
                chineseDisplay.classList.add('fade-in');
                
                setTimeout(() => {
                    vietnameseDisplay.classList.remove('fade-in');
                    chineseDisplay.classList.remove('fade-in');
                }, 400);
                
                button.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    button.style.transform = '';
                }, 150);
            });

            // 默认显示第一句双语情话
            vietnameseDisplay.textContent = bilingualLoveLines[0].viet;
            chineseDisplay.textContent = bilingualLoveLines[0].chinese;

            // 创建粒子
            function createParticle() {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const isSentence = Math.random() > 0.5; 
                
                if (isSentence) {
                    const randomIndex = Math.floor(Math.random() * vietnameseLines.length);
                    const sentence = vietnameseLines[randomIndex];
                    particle.textContent = sentence;
                    particle.classList.add('text-particle');
                    const size = 0.7 + Math.random() * 0.6;
                    particle.style.fontSize = size + 'rem';
                    const colors = ['#ffb6c1', '#ffa07a', '#ffdab9', '#e6e6fa', '#f0e68c', '#ffc0cb'];
                    particle.style.color = colors[Math.floor(Math.random() * colors.length)];
                } else {
                    const symbol = symbols[Math.floor(Math.random() * symbols.length)];
                    particle.textContent = symbol;
                    particle.classList.add('symbol');
                    const size = 0.8 + Math.random() * 1.7;
                    particle.style.fontSize = size + 'rem';
                    const colors = ['#ff99cc', '#ff6699', '#ff3366', '#ff5050', '#ffaa00', '#ffd700', '#ff69b4', '#ff1493', '#ff8c00', '#ffa500'];
                    particle.style.color = colors[Math.floor(Math.random() * colors.length)];
                }
                
                particle.style.left = Math.random() * 100 + '%';
                const duration = 4 + Math.random() * 12;
                particle.style.animationDuration = duration + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                
                particlesContainer.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, duration * 1000 + 3000);
            }

            setInterval(createParticle, 150);

            // 主情话轮播
            let currentIndex = 0;
            function updateLoveMessage() {
                loveMessageEl.textContent = vietnameseLines[currentIndex];
                // 重新添加小星星
                for (let i = 1; i <= 6; i++) {
                    const star = document.createElement('span');
                    star.className = `star-${i}`;
                    star.textContent = '✨';
                    loveMessageEl.appendChild(star);
                }
                loveMessageEl.classList.add('textPop');
                setTimeout(() => {
                    loveMessageEl.classList.remove('textPop');
                }, 400);
                
                currentIndex = (currentIndex + 1) % vietnameseLines.length;
            }
            updateLoveMessage();
            setInterval(updateLoveMessage, 1300);

            // ---------- 3D触摸旋转 ----------
            let startX = 0, startY = 0;
            let currentRotateX = 0, currentRotateY = 0;
            let isDragging = false;

            rotateContainer.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    isDragging = true;
                    e.preventDefault();
                }
            }, { passive: false });

            rotateContainer.addEventListener('touchmove', (e) => {
                if (!isDragging || e.touches.length !== 1) return;
                e.preventDefault();
                
                const dx = e.touches[0].clientX - startX;
                const dy = e.touches[0].clientY - startY;
                
                let targetRotateY = currentRotateY + dx * 0.2;
                let targetRotateX = currentRotateX - dy * 0.2;
                
                targetRotateY = Math.min(30, Math.max(-30, targetRotateY));
                targetRotateX = Math.min(30, Math.max(-30, targetRotateX));
                
                rotateContainer.style.transform = `rotateX(${targetRotateX}deg) rotateY(${targetRotateY}deg)`;
                
                currentRotateX = targetRotateX;
                currentRotateY = targetRotateY;
                
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            }, { passive: false });

            rotateContainer.addEventListener('touchend', () => {
                isDragging = false;
            });

            // 鼠标支持（调试用）
            rotateContainer.addEventListener('mousedown', (e) => {
                startX = e.clientX;
                startY = e.clientY;
                isDragging = true;
                e.preventDefault();
            });
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                e.preventDefault();
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                
                let targetRotateY = currentRotateY + dx * 0.2;
                let targetRotateX = currentRotateX - dy * 0.2;
                
                targetRotateY = Math.min(30, Math.max(-30, targetRotateY));
                targetRotateX = Math.min(30, Math.max(-30, targetRotateX));
                
                rotateContainer.style.transform = `rotateX(${targetRotateX}deg) rotateY(${targetRotateY}deg)`;
                
                currentRotateX = targetRotateX;
                currentRotateY = targetRotateY;
                
                startX = e.clientX;
                startY = e.clientY;
            });
            window.addEventListener('mouseup', () => {
                isDragging = false;
            });
        })();
    </script>
</body>
</html>
